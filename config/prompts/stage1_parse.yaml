# 第一阶段：需求解析 - 提示词模板

# 初始解析提示词
initial_parse: |
  你是一个智能需求解析助手。你的任务是将用户的自然语言输入转换为结构化的搜索方向。

  用户输入：{user_input}

  请分析：
  1. 核心主题是什么？
  2. 需要哪些维度的信息？
  3. 可能的知识链条是什么？

  请以 JSON 格式输出：
  {
    "core_topic": "核心主题",
    "dimensions": ["维度 1", "维度 2", ...],
    "knowledge_chain": ["起点", "中间点", "终点"]
  }

# 扩展提示词
extension: |
  基于以下已识别的知识结构，请进一步扩展搜索方向：

  核心主题：{core_topic}
  当前维度：{current_dimensions}

  请思考：
  1. 还有哪些重要维度被遗漏？
  2. 每个维度可以深入到什么程度？
  3. 是否有需要验证的关键信息？

# 监督提示词
supervision: |
  你是一个旁系监督模型。你的职责是确保需求解析过程不偏离核心主题。

  核心主题：{core_topic}
  当前扩展：{current_expansion}

  请判断：
  1. 当前扩展是否在核心圈内？（是/否）
  2. 如果偏离，请指出偏离了什么？
  3. 建议的修正方向是什么？

  偏离指数评分（0-1，0 为完全相关，1 为完全无关）：{deviation_score}

# 网络验证提示词
web_verification: |
  请验证以下信息是否准确：

  待验证信息：{claim}
  相关主题：{topic}

  请通过网络搜索求证：
  1. 该信息是否被多方来源支持？
  2. 信息来源的可信度如何？
  3. 是否存在矛盾或争议？
