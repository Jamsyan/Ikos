# 第一阶段：需求解析提示词模板

# 初始解析提示词
initial_parse: |
  你正在参与一个知识构建任务的第一阶段：需求解析。
  
  用户输入：{user_input}
  
  请执行以下任务：
  1. 识别用户的核心需求是什么
  2. 提取关键概念和实体
  3. 判断需求的复杂度（简单/中等/复杂）
  4. 建议需要多少轮解析（1-10 轮）
  
  请以 JSON 格式输出：
  ```json
  {
    "core_need": "核心需求描述",
    "key_concepts": ["概念 1", "概念 2"],
    "complexity": "简单/中等/复杂",
    "suggested_rounds": 3
  }
  ```

# 扩展提示词
extend_parse: |
  基于上一轮解析结果，继续扩展知识空间。
  
  当前核心主题：{core_topic}
  上一轮解析结果：{previous_result}
  
  请执行：
  1. 从当前知识点向外扩展，联想相关的知识领域
  2. 遵循"球形知识空间"原则：
     - 以核心主题为圆心
     - 知识逻辑链条为半径
     - 允许球形扩展，不允许跨圈跳跃
  3. 列出 3-5 个扩展方向
  
  示例（傅里叶变换）：
  - ✅ 正确扩展：傅里叶变换 → 傅里叶级数 → 三角级数历史
  - ❌ 错误扩展：傅里叶变换 → 傅里叶 → 拿破仑战争（跨圈跳跃）
  
  请以 JSON 格式输出扩展方向列表。

# 网络验证提示词
network_validation: |
  你需要对以下知识点进行网络搜索验证。
  
  待验证的知识点：{knowledge_point}
  核心主题：{core_topic}
  
  请生成搜索查询语句，用于验证该知识点的准确性。
  
  要求：
  1. 生成 2-3 个不同的搜索查询
  2. 确保查询能够验证信息的真实性
  3. 优先搜索权威来源（学术论文、官方文档等）
  
  输出格式：
  ```json
  {
    "queries": ["查询 1", "查询 2"],
    "reason": "为什么选择这些查询"
  }
  ```

# 旁系监督提示词
side_supervisor: |
  你是需求解析阶段的旁系监督模型。
  
  你的职责：
  1. 监控解析方向是否偏离核心主题
  2. 检测是否存在"跨圈跳跃"
  3. 判断是否需要终止解析
  
  当前解析历史：{parse_history}
  核心主题：{core_topic}
  
  请评估：
  - 偏离指数（0-1，0 表示完全吻合，1 表示完全偏离）
  - 是否需要网络验证（是/否）
  - 是否需要终止解析（是/否）
  
  输出格式：
  ```json
  {
    "deviation_score": 0.2,
    "need_validation": true,
    "should_terminate": false,
    "reason": "评估理由"
  }
  ```

# 最终工程化提示词生成
final_prompt: |
  基于前面所有轮次的解析和验证，生成最终的工程化提示词。
  
  解析历史：{parse_history}
  验证结果：{validation_results}
  核心圈定义：{core_circle}
  
  请生成一个结构化的工程化提示词，用于指导后续的智能检索阶段。
  
  要求：
  1. 明确检索目标和范围
  2. 列出关键检索维度
  3. 定义检索质量评估标准
  
  输出格式：
  ```json
  {
    "goal": "检索目标",
    "dimensions": ["维度 1", "维度 2"],
    "quality_criteria": ["标准 1", "标准 2"],
    "final_prompt": "完整的工程化提示词文本"
  }
  ```
