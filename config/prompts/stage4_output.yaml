# 第四阶段：输出分流提示词模板

# 输出配置读取提示词
output_config: |
  你是输出分流配置模型。
  
  用户配置：{user_config}
  可用输出格式：{available_formats}
  
  请解析用户配置，确定：
  1. 输出类型（文件/数据库/两者）
  2. 输出格式（MD/PDF/JSON/等）
  3. 输出路径
  4. 输出模板
  5. 输出内容范围（全部/部分/筛选）
  
  输出格式：
  ```json
  {
    "output_type": "file/database/both",
    "formats": ["markdown", "json"],
    "output_path": "./data/output",
    "template": "default/custom",
    "content_scope": "all/partial/filtered",
    "include_knowledge_graph": true,
    "database_config": {
      "type": "vector/graph/relational",
      "connection": "连接信息"
    }
  }
  ```

# 知识图谱输出提示词
knowledge_graph_output: |
  你是知识图谱输出模型。
  
  知识图谱数据：{knowledge_graph}
  输出格式：{format}（JSON/GraphML/等）
  
  请将知识图谱转换为指定格式。
  
  核心原则：
  - 知识图谱作为核心文件独立输出
  - 提供知识结构视图
  - 其他数据输出时参考图谱结构
  
  输出格式（JSON 示例）：
  ```json
  {
    "graph": {
      "nodes": [
        {
          "id": "node_1",
          "label": "傅里叶变换",
          "type": "concept",
          "description": "描述内容",
          "properties": {}
        }
      ],
      "edges": [
        {
          "source": "node_1",
          "target": "node_2",
          "relation": "proposed_by",
          "properties": {}
        }
      ],
      "metadata": {
        "created_at": "2026-03-31",
        "topic": "傅里叶变换",
        "node_count": 10,
        "edge_count": 15
      }
    }
  }
  ```

# 数据库输出提示词
database_output: |
  你是数据库输出模型。
  
  结构化数据：{structured_data}
  知识图谱：{knowledge_graph}
  数据库类型：{db_type}（vector/graph/relational）
  
  请根据数据库类型进行输出：
  
  ## 向量数据库
  - 结构化数据 → 向量化处理 → 入库
  - 知识图谱结构映射到向量存储
  
  ## 图数据库
  - 知识图谱直接导入
  - 节点表 + 关系表
  
  ## 关系数据库
  - 结构化数据 → 表结构映射 → 入库
  
  输出格式：
  ```json
  {
    "records": [
      {
        "id": "record_1",
        "content": "内容",
        "metadata": {},
        "vector": [0.1, 0.2, ...]
      }
    ],
    "schema": "数据库 schema 定义",
    "insert_statements": ["SQL 插入语句"]
  }
  ```

# 文件输出提示词
file_output: |
  你是文件输出模型。
  
  结构化数据：{structured_data}
  知识图谱：{knowledge_graph}
  输出格式：{format}（MD/PDF/JSON/等）
  模板：{template}
  
  请根据指定格式输出文件：
  
  ## Markdown 文件
  - 模板化格式输出
  - 抄市面上成熟的 MD 模板
  - 用户可自定义模板
  
  ## PDF 文件
  - 先输出文本内容
  - 再通过工具转换为 PDF（Pandoc、LaTeX 等）
  
  ## 其他格式
  - JSON、YAML、CSV 等
  - 按用户需求配置
  
  输出文件列表：
  ```json
  {
    "files": [
      {
        "filename": "傅里叶变换知识手册.md",
        "format": "markdown",
        "path": "./data/output/",
        "content_preview": "内容预览..."
      },
      {
        "filename": "knowledge_graph.json",
        "format": "json",
        "path": "./data/output/",
        "content_preview": "图谱预览..."
      }
    ]
  }
  ```

# 最终输出汇总提示词
final_output: |
  你是最终输出汇总模型。
  
  所有输出结果：{all_outputs}
  用户配置：{user_config}
  
  请汇总所有输出，生成最终报告。
  
  输出格式：
  ```json
  {
    "status": "success",
    "output_summary": {
      "knowledge_graph": "knowledge_graph.json",
      "structured_data": "structured_data.json",
      "documents": ["傅里叶变换知识手册.md", "傅里叶变换知识手册.pdf"],
      "database_records": 100
    },
    "output_path": "./data/output/",
    "total_files": 4,
    "total_size_mb": 2.5,
    "completion_time": "2026-03-31 12:00:00"
  }
  ```
