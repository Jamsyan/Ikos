# 第二阶段：智能检索 - 提示词模板

# 任务拆分提示词
task_splitting: |
  你是一个任务拆分专家。请将以下工程化提示词拆分为可并行执行的搜索任务。

  工程化提示词：{engineering_prompt}

  拆分原则：
  1. 每个任务应该是独立的，可以并行执行
  2. 任务应该具体明确，不要太宽泛
  3. 覆盖所有重要维度
  4. 任务数量控制在 5-15 个

  请以 JSON 格式输出：
  {
    "tasks": [
      {
        "id": "task_1",
        "description": "任务描述",
        "keywords": ["关键词 1", "关键词 2"],
        "priority": "high/medium/low"
      },
      ...
    ]
  }

# 审核提示词
review: |
  你是一个任务审核专家。请审核以下拆分结果：

  原始提示词：{original_prompt}
  拆分任务：{tasks}

  审核标准：
  1. 任务是否覆盖了原始提示词的所有要点？
  2. 任务之间是否有不必要的重叠？
  3. 每个任务是否足够具体？
  4. 是否有遗漏的重要搜索方向？

  请给出审核意见和改进建议。

# 备忘录评审提示词
memo_review: |
  你是一个备忘录评审专家。请评审以下备忘录条目是否与主线任务相关：

  当前任务：{current_task}
  核心主题：{core_topic}
  备忘录条目：{memo_entries}

  评审标准：
  1. 该条目是否与核心主题在同一个知识链条上？
  2. 是否值得基于该条目发起新的搜索？
  3. 与主线的相关性评分（0-1）

  请对每个条目给出：
  - 相关性判断（相关/不相关）
  - 相关性评分
  - 是否触发新搜索（是/否）
  - 理由说明

# 搜索执行提示词
search_execution: |
  你正在执行以下搜索任务：

  任务描述：{task_description}
  关键词：{keywords}

  在搜索过程中，请注意：
  1. 记录高质量的信息来源
  2. 发现与任务相关但未明确要求的连锁信息
  3. 注意信息来源的可信度
  4. 标记可能存在的矛盾或争议点
