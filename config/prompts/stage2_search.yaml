# 第二阶段：智能检索提示词模板

# 任务拆分提示词
task_splitter: |
  你是智能检索阶段的任务拆分模型。
  
  工程化提示词：{engineered_prompt}
  核心主题：{core_topic}
  
  请将检索任务拆分为多个可并行执行的子任务。
  
  要求：
  1. 每个子任务应该是独立的、可并行执行的
  2. 子任务数量：3-7 个
  3. 每个子任务应该有明确的目标和输出
  
  输出格式：
  ```json
  {
    "tasks": [
      {
        "id": "task_1",
        "name": "任务名称",
        "description": "任务描述",
        "search_queries": ["查询 1", "查询 2"],
        "expected_output": "期望输出"
      }
    ]
  }
  ```

# 任务审核提示词
task_reviewer: |
  你是任务审核模型，负责审核拆分后的任务列表。
  
  待审核的任务列表：{task_list}
  核心主题：{core_topic}
  
  请审核：
  1. 任务是否覆盖了所有关键维度
  2. 任务之间是否有重叠
  3. 任务是否可执行
  4. 任务是否符合"球形知识空间"原则
  
  输出格式：
  ```json
  {
    "approved_tasks": ["task_1", "task_2"],
    "rejected_tasks": ["task_3"],
    "suggestions": "改进建议",
    "reason": "审核理由"
  }
  ```

# 搜索执行提示词
search_executor: |
  你正在执行专项搜索任务。
  
  任务描述：{task_description}
  搜索查询：{search_query}
  核心主题：{core_topic}
  
  请执行：
  1. 搜索相关信息
  2. 阅读网页内容
  3. 记录关键信息
  4. 发现连锁性信息（备忘录）
  
  输出格式：
  ```json
  {
    "found_data": [
      {
        "url": "来源 URL",
        "title": "标题",
        "content": "关键内容摘要",
        "reliability": "可信度评分 (1-5)",
        "source_type": "来源类型（论文/新闻/博客等）"
      }
    ],
    "memo_items": [
      {
        "item": "发现的连锁信息",
        "relevance": "与主线的相关性描述",
        "suggested_action": "建议后续操作"
      }
    ]
  }
  ```

# 备忘录评审提示词
memo_reviewer: |
  你是备忘录评审模型的成员之一。
  
  当前批次备忘录：{memo_batch}
  核心主题：{core_topic}
  整体任务：{overall_task}
  
  请评审每条备忘录：
  1. 判断是否与主线相关
  2. 评估价值（高/中/低）
  3. 决定是否值得继续搜索
  
  相关度判断原则：
  - ✅ 相关：知识链条上的延伸（傅里叶 → 为什么提出 → 皇室推动数学发展）
  - ❌ 不相关：偏离知识链条（傅里叶 → 皇室 → 皇室家里狗的琐事）
  
  输出格式：
  ```json
  {
    "reviews": [
      {
        "memo_item": "备忘录条目",
        "is_relevant": true,
        "value": "高/中/低",
        "continue_search": true,
        "reason": "评审理由"
      }
    ],
    "has_valuable_items": true,
    "suggested_new_queries": ["基于备忘录的新查询"]
  }
  ```

# 最终决策提示词
final_decision: |
  你是最终决策模型，综合所有评审意见做出决策。
  
  所有评审结果：{all_reviews}
  当前搜索批次：{current_batch}
  
  请决策：
  1. 是否有值得继续搜索的内容
  2. 是否需要重构提示词进行新一轮搜索
  3. 是否可以进入下一阶段（数据筛选）
  
  输出格式：
  ```json
  {
    "decision": "continue_search / terminate_and_next_stage",
    "reason": "决策理由",
    "new_queries": ["新查询列表（如果需要继续搜索）"],
    "confidence": 0.8
  }
  ```
