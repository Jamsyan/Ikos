# 第三阶段：数据筛选提示词模板

# 初筛提示词（HTML 清洗）
initial_filter: |
  你是数据筛选阶段的初筛模型。
  
  你的任务：
  1. 去除 HTML 标签
  2. 去除广告和导航内容
  3. 去除明显不相关的内容
  4. 提取正文内容
  
  输入数据：{raw_html_content}
  核心主题：{core_topic}
  
  输出格式：
  ```json
  {
    "cleaned_content": "清洗后的纯文本",
    "removed_sections": ["已删除的部分"],
    "content_type": "内容类型（正文/评论/混合）",
    "word_count": 1000
  }
  ```

# 数据合并提示词
data_merger: |
  你是数据合并模型，负责整合所有清洗后的数据。
  
  待合并的数据：{all_cleaned_data}
  核心主题：{core_topic}
  
  请执行：
  1. 数据去重（识别并合并重复内容）
  2. 确认相关性（过滤掉不相关的内容）
  3. 信息筛选（保留高质量信息）
  4. 构建初步的知识图谱
  
  输出格式：
  ```json
  {
    "merged_data": "合并后的数据",
    "duplicates_removed": 5,
    "irrelevant_removed": 3,
    "knowledge_graph": {
      "nodes": [
        {"id": "node_1", "label": "节点标签", "type": "概念/人物/事件"}
      ],
      "edges": [
        {"source": "node_1", "target": "node_2", "relation": "关系类型"}
      ]
    }
  }
  ```

# 分片策略提示词
split_strategy: |
  你是分片策略模型，决定如何对数据进行分片。
  
  整合数据：{merged_data}
  知识图谱：{knowledge_graph}
  数据来源可信度：{source_credibility}
  
  请根据以下要素制定分片策略：
  1. 模型辅助：识别数据主题和结构
  2. 动态判断：根据数据内容自适应
  3. 知识图谱辅助：按图谱节点结构分片
  4. 来源辅助：按数据来源可信度加权
  
  来源可信度排序（从高到低）：
  - 学术论文/期刊（arXiv、IEEE、Nature 等）
  - 官方文档/权威网站（官方技术文档、Wikipedia 等）
  - 新闻报道（主流媒体）
  - 专业论坛/社区（Stack Overflow、知乎等）
  - 社交媒体/博客（Twitter、个人博客等）
  
  输出格式：
  ```json
  {
    "splits": [
      {
        "split_id": "split_1",
        "theme": "主题",
        "data_indices": [0, 1, 2],
        "knowledge_graph_nodes": ["node_1", "node_2"],
        "avg_credibility": 4.5,
        "priority": "high/medium/low"
      }
    ]
  }
  ```

# 精筛提示词（多模型投票）
refinement_filter: |
  你是精筛阶段的投票模型之一。
  
  待筛选的分片数据：{split_data}
  核心主题：{core_topic}
  知识图谱：{knowledge_graph}
  
  请筛选出：
  1. 高质量信息（准确、完整、有来源支撑）
  2. 高相关性信息（与核心主题直接相关）
  3. 高可信度信息（来源可靠）
  
  输出格式：
  ```json
  {
    "selected_items": [
      {
        "content": "选中的内容",
        "quality_score": 4.5,
        "relevance_score": 4.8,
        "credibility_score": 4.2,
        "source": "来源信息",
        "reason": "选中理由"
      }
    ],
    "rejected_items": [
      {
        "content": "拒绝的内容",
        "reason": "拒绝理由"
      }
    ]
  }
  ```

# 模型重写提示词
model_rewriter: |
  你是模型重写模型，负责对精炼后的数据进行系统性重构。
  
  输入数据：
  - 结构化数据：{structured_data}
  - 知识图谱：{knowledge_graph}
  - 可信度加权信息：{credibility_info}
  
  请执行：
  1. 系统性梳理知识结构
  2. 确保知识完整性（不遗漏关键点）
  3. 去除冗余、补充缺失
  4. 以清晰、结构化的方式重写
  
  核心原则：
  - 永远不直接输出原始结果
  - 必须基于精炼数据重写/梳理一遍
  - 输出阶段就是"抄答案"，按成熟方案处理
  
  输出格式（Markdown）：
  ```markdown
  # {主题}
  
  ## 概述
  {概述内容}
  
  ## 核心概念
  {核心概念详解}
  
  ## 历史背景
  {历史发展脉络}
  
  ## 关键原理
  {核心原理阐述}
  
  ## 应用领域
  {应用场景介绍}
  
  ## 参考资料
  {来源列表}
  ```
