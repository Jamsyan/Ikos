# 第三阶段：数据筛选 - 提示词模板

# 数据整合提示词
data_integration: |
  你是一个数据整合专家。请整合以下多来源的数据：

  数据来源：{sources}
  数据内容：{data_chunks}

  整合原则：
  1. 去除重复内容
  2. 识别并标记矛盾点
  3. 按照知识图谱的结构组织信息
  4. 标注每个信息点的来源和可信度

  请输出：
  - 整合后的数据结构
  - 矛盾点列表
  - 知识图谱的初步节点和边

# 多模型投票提示词
voting: |
  你是一个投票决策参与者。请对以下数据进行筛选：

  待筛选数据：{data}
  筛选标准：{criteria}
  核心主题：{core_topic}

  请独立判断：
  1. 哪些信息是核心且必要的？
  2. 哪些信息是冗余或次要的？
  3. 哪些信息存在质量问题（不可靠、过时等）？

  请输出你的筛选结果和理由。

# 模型重写提示词
rewriting: |
  你是一个专业编辑。请基于以下材料撰写最终输出：

  结构化数据：{structured_data}
  知识图谱：{knowledge_graph}
  可信度信息：{credibility_info}

  重写原则：
  1. 系统性梳理，确保逻辑连贯
  2. 去除冗余，保留核心
  3. 补充缺失的关键信息
  4. 确保知识完整性
  5. 使用清晰、准确的语言

  输出格式：{output_format}
  目标读者：{target_audience}

  请开始撰写：

# 知识图谱构建提示词
kg_construction: |
  你是一个知识图谱构建专家。请从以下数据中提取实体和关系：

  输入数据：{data}
  核心主题：{core_topic}

  请识别：
  1. 核心实体（节点）
  2. 实体之间的关系（边）
  3. 实体的属性
  4. 关系的类型和方向

  请以标准的图谱格式输出（JSON-LD 或类似）。
