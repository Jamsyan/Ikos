# Ikos 多模型配置文件

# 模型角色定义
# 根据架构文档，系统需要以下角色的模型：
# - 拆分模型（3 个）：各自独立拆分提示词为任务列表
# - 审核模型（2 个）：双重审核拆分结果的合理性
# - 决策模型（1 个）：综合投票，产出最终任务列表
# - 旁系监督模型（1 个）：监控方向是否跑偏

# 默认模型配置（0.1.0 版本使用单模型）
default_model: &default_model
  name: "qwen3.5:7b"
  provider: "ollama"
  temperature: 0.7
  max_tokens: 2048

# 多模型投票配置（0.2.0+ 版本使用）
multi_model_config:
  # 拆分模型组（3 个）
  splitters:
    - name: "qwen3.5:7b"
      provider: "ollama"
      weight: 1.0
    - name: "qwen3.5:14b"
      provider: "ollama"
      weight: 1.2
    - name: "deepseek-r1:7b"
      provider: "ollama"
      weight: 1.1
  
  # 审核模型组（2 个）
  reviewers:
    - name: "qwen3.5:14b"
      provider: "ollama"
      weight: 1.2
    - name: "llama3.1:8b"
      provider: "ollama"
      weight: 1.0
  
  # 决策模型（1 个）
  decider:
    name: "qwen3.5:14b"
    provider: "ollama"
    weight: 1.5
  
  # 旁系监督模型（1 个）
  supervisor:
    name: "qwen3.5:7b"
    provider: "ollama"
    weight: 1.0

# 各阶段专用模型配置
stage_models:
  # 第一阶段：需求解析
  stage1:
    parser: *default_model
    validator: *default_model
    supervisor: *default_model
  
  # 第二阶段：智能检索
  stage2:
    splitter: *default_model
    reviewer: *default_model
    decider: *default_model
    searcher: *default_model
  
  # 第三阶段：数据筛选
  stage3:
    initial_filter: *default_model
    merger: *default_model
    refiner: *default_model
    rewriter: *default_model
  
  # 第四阶段：输出分流
  stage4:
    dispatcher: *default_model
    formatter: *default_model

# 投票策略配置
voting_strategy:
  # 投票策略类型
  # - majority: 多数投票
  # - weighted: 加权投票
  default_strategy: "majority"
  
  # 最小一致比例（低于此值则拒绝结果）
  min_agreement: 0.5
  
  # 模型权重（用于加权投票）
  model_weights:
    "qwen3.5:7b": 1.0
    "qwen3.5:14b": 1.2
    "qwen3.5:35b": 1.5
    "deepseek-r1:7b": 1.1
    "deepseek-r1:14b": 1.3
    "llama3.1:8b": 1.0

# 模型降级策略（资源不足时）
fallback_strategy:
  # 显存不足时的降级顺序
  memory_priority:
    - "qwen3.5:0.5b"
    - "qwen3.5:2b"
    - "qwen3.5:4b"
    - "qwen3.5:7b"
    - "qwen3.5:14b"
    - "qwen3.5:35b"
  
  # 单模型模式（0.1.0 版本使用）
  single_model_mode: true
