# 多模型配置
# 用于多模型投票机制

# 模型角色分配
roles:
  # 拆分模型（负责拆分任务）
  splitters:
    - "qwen3.5:7b"
    - "qwen3.5:14b"
    - "deepseek-r1:7b"

  # 审核模型（负责审核拆分结果）
  reviewers:
    - "qwen3.5:14b"
    - "deepseek-r1:7b"

  # 决策模型（负责最终决策）
  deciders:
    - "qwen3.5:14b"

# 投票策略
voting:
  # 默认策略 (majority/weighted)
  default_strategy: "majority"

  # 权重配置（用于 weighted 策略）
  weights:
    "qwen3.5:7b": 0.8
    "qwen3.5:14b": 1.0
    "qwen3.5:35b": 1.2
    "deepseek-r1:7b": 1.0
    "deepseek-r1:14b": 1.1

# 模型能力描述
capabilities:
  "qwen3.5:7b":
    speed: "fast"
    quality: "good"
    best_for: ["general_tasks", "quick_responses"]

  "qwen3.5:14b":
    speed: "medium"
    quality: "excellent"
    best_for: ["complex_reasoning", "quality_output"]

  "qwen3.5:35b":
    speed: "slow"
    quality: "best"
    best_for: ["critical_decisions", "expert_tasks"]

  "deepseek-r1:7b":
    speed: "fast"
    quality: "good"
    best_for: ["math", "code", "logical_reasoning"]

  "deepseek-r1:14b":
    speed: "medium"
    quality: "excellent"
    best_for: ["advanced_math", "complex_code"]
